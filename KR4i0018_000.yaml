body:
  text: 石林詩話詩文評類提要臣等謹案石林詩話一卷宋葉夢得撰夢得有春秋傳諸書已别著録是書乃其平日論詩之語其中推重王安石者不一而足而於歐陽修詩一則摘其評河豚詩之誤一則摘其語有不倫亦不復改一則托其疑夜半鐘聲之誤於蘇軾一則譏其繁悶割愁之句為險諢一則譏其捐三尺字及亂蛙兩部句為歇後一則譏其失李豸一則譏其不能聽文同一則譏其石建牏厠之誤皆有所抑揚於其間蓋夢得出蔡京之門而其壻章沖則章惇之孫故于公論大明之後尚隂抑元祐諸人然夢得詩文實南北宋間之巨擘其所評論往往深中窽會終非他家聽聲之見隨人為是非者也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cde0d9a1a6dc2c77844e8cb7bee34f2959c1ea8464770eff2a79563d636f8ab0
