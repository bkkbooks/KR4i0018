body:
  text: 石林詩話宋葉夢得撰趙清獻公以清德服一世平生畜雷氏琴一張鶴與白龜各一所向與之俱始除帥成都蜀風素侈公單馬就道以琴鶴龜自隨蜀人安其政治聲藉甚元豐間既罷政事守越復自越再移蜀時公將老矣過泗州渡淮前已放鶴至是復以龜投淮中既入見先帝問聞卿前已匹馬入蜀所攜獨琴鶴亷者固如是乎公頓首謝故其詩有云馬尋舊路如歸去龜放長淮不再來者自紀其實也劉貢父天資滑稽不能自禁遇可諧諢雖公卿不避與王荆公素厚荆公復當國亦屢謔之雖每為絶倒然意終不能平也元豐末為東京轉運使貶衡州監酒雖坐他纍議者嘗以時相姓名為戲惡之也元祐初起知襄州淳于髠墓在境內嘗以詩題云微言動相國大笑絶冠纓流轉有餘智滑稽全姓名師儒空稷下衡蓋盡南荆贅壻不為辱旅墳知客卿又有續陳師厚善謔詩云善謔知君意何傷衛武公蓋記前事且以自解云晏元獻公留守南郡王君玉時巳為館閣挍勘公特請於朝以為府簽判朝廷不得巳使帶館職從公外官帶館職自君玉始賓主相得日以賦詩飲酒為樂佳時勝日未嘗輒廢也嘗遇中秋隂晦齋厨夙為備公適無命既至夜君玉密使人伺公曰已寢矣君玉亟為詩以入曰只在浮雲最深處試馮絃管一吹開公枕上得詩大喜即索衣起徑召客治具大合樂至夜分果月出遂樂飲逹旦前輩風流固不凡然幕府有佳客風月亦自如人薏也歐陽文忠公記梅聖俞河豚詩春洲生荻芽春岸飛楊花破題兩句已道盡河豚好處謂河豚出於暮春食栁絮而肥殆不然今浙人食河豚始於上元前常州江隂最先得方出時一尾至直千錢然不多得非富人大家預以金噉漁人未易致二月後日益多一尾才百錢耳栁絮時人已不食謂之班子或言其腹中生蟲故惡之而江西人始得食蓋河豚出於海初與潮俱上至春深其數稍流入于江公吉州人故所知者江西事也姑蘇州學之南積水瀰數頃傍有一小山高下折相望蓋錢氏時廣陵王所作既積土山因以其地瀦水今瑞光寺即其宅而此其别圃也慶厯間蘇子美謫廢以四十千得之為居傍水作亭曰滄浪歐陽文忠公詩所謂清風明月本無價可惜秪賣四萬錢者也子美既死其後不能保遂屢易主今為章僕射子厚家所有廣其故址為大閣又為堂山上亭北跨水復有山名洞山章氏併得之既除地發其下皆嵌空大石又得千餘株亦廣陵時所藏益以增纍其隙兩山相對遂為一時雄觀土地蓋有所歸也王荆公晚年詩律尤精嚴造語用字間不容髮然意與言會言隨意遣渾然天成殆不見有牽率排比處如含風鴨緑鱗鱗起弄日鵝黃裊裊垂讀之初不覺有對偶至細數落花因坐久緩尋芳草得歸遲但見舒間容與之態耳而字字細考之若經櫽括權衡者其用意亦深刻矣嘗與葉致逺諸人和頭字韻詩往返數四其末篇有云名譽子真矜谷口事功新息困壺頭以谷口對壺頭其精切如此後數日復取本追改云豈愛京師傳谷口但知鄉里勝壺頭只今集中兩本並存蔡天啓云荆公每稱老杜鈎簾宿鷺起丸藥流鶯囀之句以為用意高妙五字之模楷他日公作詩得青山捫虱坐黃鳥挾書眠自謂不減杜語以為得意然不能舉全篇余嘗頃以語薛肇明肇明後被旨編公集求之終莫得或云公但得此一聨未嘗成章也襌宗論雲間有三種語其一為隨波逐浪句謂隨物應機不主故常其二為截斷衆流句謂超出言外非情識所致其三為函蓋乾坤句謂泯然皆契無間可伺其深淺以是為序豫嘗戲謂學子言老杜詩亦有此三種語但先後不同波漂菰米沈雲黑露冷蓮房墜粉紅為函蓋乾坤句以落花遊絲白日靜鳴鳩乳燕青春深為隨波逐浪句以百年地僻柴門逈五月江深草閣寒為截斷衆流句若有解此當與渠同參歐陽文忠公詩始矯昆體專以氣格為主故其言多平易疏暢律詩意所到處雖語有不倫亦不復問而學之者往往遂失真傾囷倒廪無復餘地然公詩好處豈專在此如崇徽公主手痕詩玉顔自昔為身纍食肉何人與國謀此自是兩假大議論而抑揚曲折發見於七字之中婉麗雄勝字字不失相對雖昆體之工者亦未易比言意所會要當如是乃為至到許昌西湖與子城密相附緣城而不可䇿杖往來不涉城市云是曲環作鎮時取土築城因以其地導潩水瀦之略廣百餘畝中為橫堤初但有其東之半耳其西廣於東增倍而水不甚深宋莒公為守時因起黃河春夫浚治之始與西相通則其詩所謂鑿開魚鳥忘情地展盡江湖極目天者也其後韓持國作大亭水中取其詩名之曰展江然水面雖闊西邊終易堙塞數十年來公厨規利者遂涸以為田嵗入才得三百斛以佐釀酒而水無幾矣豫為守時復以還舊稍益開浚渺然真有江湖之趣莒公詩更有一篇中云向晚舊灘都浸月遇寒新水便生煙尤風流有味而世不傳往往但記前聨耳賈文元曲水園在許昌城北有大竹三十餘畝潩河貫其中以入西湖最為佳處初為本州民所有文潞公為守買得之潞公自許移鎮北門而文元為代一日挈家往遊題詩壁間云畫船載酒及芳辰丞相園林潩水濵虎節麟符拋不得却將清景付間人遂走使持詩寄北門潞公得之大喜即以地劵歸賈氏文元亦不辭而受然文元居京師後亦不復再至園今荒廢竹亦殘毁過半矣杜正獻公自少清羸若不勝衣年過四十鬚髮即盡白雖立朝孤竣凛然不可屈而不為竒節危行雍容持守不以有所不為為賢而以得其所為為幸歐陽文忠公素出其門公謝事居宋文忠適來為守相與歡甚公不甚飲酒唯賦詩唱酬是時年巳八十然憂國之意猶慷慨不已每見於色歐公嘗和公詩有云貌先年老因憂國事與心違始乞身公得之大喜常自諷誦當時以謂不惟曲盡公志雖其形貌亦在模寫中也元豐初北人來議地界韓丞相名縝自樞密院都承旨出分畫玉汝有愛妾劉氏將行劇飲通夕且作樂府詞留别翌日神宗巳密知忽中批步軍司遣兵為搬家追送之玉汝初莫測所因久之方知其自樂府發也蓋上以恩澤待下雖閨門之私亦恤之如此故中外士大夫無不樂盡其力劉貢父玉汝姻黨即作小詩寄之以戲云嫖姚不復顧家為誰謂東山久不歸卷耳幸容携婉孌皇華何啻有光輝玉汝之詞由此亦遂盛傳於天下神宗皇帝天性儉約奉慈夀宫尤盡孝道慈聖太后嘗以乘輿服物未備因同天節作珠子鞍轡為夀神宗一御於禁中後藏去不復用一日與兩宫幸後苑賞花慈夀輦至神宗即降步親扶慈聖出輦屢却不從聞者太息慈聖上仙李奉世時為侍郎進挽詩有珠韀昔御恩猶未玉輦親扶事已非蓋記此二事神宗覽之泣下蔡天啓云嘗與張文潛論韓栁五言警句文潛舉退之暖風抽宿麥清雨卷歸旗子厚壁空殘月曙門掩候蟲秋皆為集中第一司馬溫公熙寧間自長安得請留臺歸始至洛中嘗以詩言懷云三十餘年西復東勞生薄宦等飛蓬所存舊業惟清白不負明君有朴忠早避喧煩真得䇿未逄危辱早收功太平觸處農桑滿贏取閭閻鶴髮翁出處大節世固不容復議是時雖以論不合去而神宗眷禮之意愈厚然猶以避煩畏辱為言況其下者乎元祐初起相至是十七年矣度公之意初蓋未嘗以自期也外祖朝君誠善詩蘇子瞻為集序所謂溫厚靜深如其為人者也黃魯直常誦其小雨愔愔人不寐卧聽羸馬齕殘蔬愛賞不已他日得句云馬齕枯萁喧午夢誤驚風雨浪翻江自以為工以語舅氏無咎曰吾詩實發於乃翁前聯余始聞舅氏言此不解風雨翻江之意一日憩於逆旅聞傍舍有澎湃鞺鞳之聲如風浪之厯船者起視之乃馬食於槽水與草齟齬於槽間而為此聲方悟魯直之好竒然此亦非可以意索適相遇而得之也元豐間蘇子瞻繫大理獄神宗本無意深罪子瞻時相進呈忽言蘇軾於陛下有不臣意神宗改容曰軾固有罪然於朕不應至是卿何以知之時相因舉軾檜詩根到九泉無曲處世間唯有蟄龍知之句對曰陛下飛龍在天軾以為不知已而求之地下之蟄龍非不臣而何神宗曰詩人之詞安可如此論彼自詠檜何預朕事時相語塞章子厚亦從旁解之遂薄其罪子厚嘗以語余且以危言詆時相曰人之害物無所忌憚有如是也開簾風動竹疑是故人來與徘徊花上月空度可憐宵此兩聯雖見唐人小説中其實佳句也鄭谷詩睡輕可忍風敲竹飲散那堪月在花意蓋與此同然論其格力適堪揭酒家壁與市人書扇耳天下事每患自以為工處著力太過何但詩也蜀人君翼黃魯直黔中時從逰最久嘗言見魯直自矜詩一聯云人得交逰是風月天開圖畫即江山以為晚年最得意每舉以教人而終不能成篇蓋不欲以常語雜之然魯直自有山圍燕坐圖畫出水作夜窗風雨來之句余以為氣格當勝前聯也詩下雙字極難須使七言五言之間除去五字三字外精神興致全見於兩言方為工妙唐人記水田飛白鷺夏朩囀黃鸝為李嘉祐詩王摩詰竊取之非也此兩句好處正好添漠漠隂隂四字此乃摩詰為嘉祐點化以自見其妙如李光弼將郭子儀軍一號令之精彩數倍不然如嘉祐本句但是詠景耳人皆可到要之當令如老杜無邊落朩蕭蕭下不盡長江袞袞來與江天漠漠鳥雙去風雨時時龍一吟等乃為超絶近世王荆公新秋浦溆綿綿靜薄晚園林往往青與蘇子瞻浥浥爐香初泛夜離離花影欲搖春皆可以追配前作也詩終篇有操縱不可拘用一律蘇子瞻林行婆家初閉戶翟夫子舍尚留關始讀殆未測其意蓋下有娟娟缺月黃昏後嫋嫋新居紫翠間繫悶豈無羅帶水割愁還有劔鋩山四句則入頭不怕放行寧傷於拙也然繫悶羅帶割愁劔鋩之語大是險諢亦何可屢打長篇最難晉魏以前詩無過十韻者蓋嘗使人以意逆志初不以序事傾盡為工至老杜述懷北征諸篇窮極筆力如太史公紀傳此固古今絶唱然八哀八篇本非集中髙作而世多尊稱之不敢議此乃揣骨聽聲耳其病蓋傷於多也如李雍蘇源明詩中極多纍句余嘗痛刋去僅各取其半方為盡善然此語不可為不知者言也江干初雪圖真迹藏李邦直家唐蠟本世傳為摩詰所作末有元豐間王禹玉蔡持正韓玉汝章子厚王和甫張邃明安厚卿七人題詩建中靖國元年韓師朴相邦直厚卿同在二府時前七人者所存唯厚卿而已持正貶死嶺外禹玉追貶子厚方貶玉汝和甫邃明則死久矣故師朴繼題其後曰諸公當日聚巖廊半謫南荒半已亡惟有紫樞黃閣老再開圖畫看瀟湘是時邦直在門下厚卿在西府紫樞黃閣謂二人也厚卿復題云曾遊滄海困驚瀾晚涉風波路更難從此江湖無限興不如秪向畫圖看而邦直亦自題云此身何補一毫芒三辱清時政事堂病骨未為山下土尚尋遺墨話存亡余家有此模本併録諸公詩續之每出慨然自元豐至建中靖國幾三十年諸公之名官亦已至矣然始皆有願為圖中之逰而不暇得故禹玉云何日扁舟載風雪却將蓑笠伴漁人玉汝云君恩未報身何有且寄扁舟夢想中其後廢謫流竄有雖死不得免者而江湖間此景無處不有皆不得一償厚卿至為危辭蓋有激而云豈此景無不可得亦自不能踐其言耳韓持國雖剛果特立風節凛然而情致風流髙其流輩許昌崔象之侍郎舊第今為杜君章家所有廳後小亭僅丈餘舊有海棠兩株持國每花開時輒載酒日飲其下竟謝而去嵗以為常至今故老猶能言之余嘗於小亭柱間得公二絶句其一云濯錦江頭干萬枝當年未解惜芳菲而今得向君家見不怕春寒雨溼衣尚可想見當時氣味韓忠憲公嘗帥蜀持國兄弟皆侍行尚少故前兩句云爾其二云長條無風亦自動柔艷著雨更相宜漫其後句曾存之家池中島上亦有海棠十許株余為守時嵗亦與王幼安諸人席地屢飲然此公勝處不能繼也詩之用事不可牽強必至於不得不用而後用之則事辭為一莫見其安排鬭湊之迹蘇子瞻嘗為人作挽詩云豈意日斜庚子後忽驚嵗在己辰年此乃天生作對不假人力溫庭筠詩云有用甲子相對者云風卷蓬根屯戊巳月移松影守庚申兩語本不相類其題云與道士守庚申時聞西方有警事邂逅適然固不可知然以其用意附會觀之疑若得此對而就為之題者此蔽於用事之弊也前輩詩材亦或預為儲蓄然非所當用未嘗強出余嘗從趙德麟假陶淵明集本蓋子瞻所閲者時有改定字末手題兩聯云人言盧杞是姦邪我覺魏公真嫵媚又槐花黃舉子忙促織鳴懶婦驚不知偶書之耶或將以為用也然子瞻詩後不見此語則固無意於必用矣王荆公作韓魏公挽辭云朩稼曾聞逹官怕山頽今見哲人萎或言亦是平時所得魏公之薨是嵗適雨朩氷前一嵗華山崩偶有二事故不覺爾世言社日飲酒治聾不知其何據五代李濤有春社從李昉求酒詩云社公今日沒心情乞為治聾酒一瓶惱亂玉堂將欲遍依稀巡到第三廳昉時為翰林學士有日給內庫酒故濤從乞之則其傳亦已久矣社公濤小字也唐人在慶侍下雖官髙年大皆稱小字濤性疏逹不羈善諧謔與朝士言亦多以社翁自名聞者無不以為笑然亮直敢言後官亦至宰相韓退之雙鳥詩殆不可曉頃嘗以問蘇丞相子容云意似是指佛老二學以其終篇本末考之亦或然也杜子美病柏病橘枯棕枯楠四詩皆興當時事病柏當為明皇作與杜鵑行同意枯棕比民之殘困則其篇中自言矣枯楠云猶含棟梁具無復霄漢志當為房次律之徒作惟病橘始言惜哉結實小酸澀如棠梨末以比荔枝勞民疑若指近幸之不得志者自漢魏以來詩人用意深逺不失古風惟此公為然不但語言之工也劉貢父以司空圖詩中咄喏二字辨晉書所載石崇豆粥咄嗟而辦為誤以喏為嗟非也孫楚詩自有三命皆有極咄嗟不可保之語此亦豈是以喏為嗟古今語言固有各於一時本不與後世相通者咄嗟皆聲也自晉以前未見有言咄殷浩所謂咄咄逼人蓋拒物之聲嗟乃嘆聲咄嗟猶言呼吸疑是晉人一時語故孫楚亦云爾頃見朝無咎舉魯直詩人家寒橘柚秋色老梧桐張文潛云斜日兩竿眠犢晚春波一頃去鳬寒皆自以為莫能及王荆公詩有老景春可惜無花可留得莫嫌柳渾青終恨李太白之句以古人姓名藏句中蓋以文為戲或者謂前無此體自公始見之余讀權德輿集其一篇云藩宣秉戎寄衡石崇位勢年紀信不留弛張良自愧樵蘇則為愜瓜李斯可畏不顧榮官尊每陳農畝利家林類巖巘負郭躬斂積志滿寵生嫌養蒙恬勝智疏鍾皓月曉晚景丹霞異澗谷永不諼山川景梁冀無纍頗符生學展禽尚志從此直不疑支離疏世事則德輿已嘗為此體乃知古人文章之變殆無遺藴德輿在唐不以詩名然詞亦雅暢此篇雖主意在立别體然亦自不失為佳製也楊大年劉子儀皆喜唐彥謙詩以其用事精巧對偶親切黃魯直詩體雖不類然亦不以楊劉為過如彥謙題漢髙廟云耳聞明主提三尺眼見愚民盜一抔雖是著題然語皆歇後一抔事無兩出或可略土字如三尺律三尺喙皆可何獨劍乎耳聞明主眼見愚民尤不成語余數見交遊道魯直意殊不可解蘇子瞻詩有買牛但自捐三尺射鼠何勞挽六鈞亦與此同病六鈞可去弓字三尺不可去劍字此理甚易知也蘇子瞻嘗兩用孔稚圭鳴蛙事如水底笙簧蛙兩部山中奴婢橘千頭雖似笙簧易鼓吹不礙其意同至已遣亂蛙成兩部更邀明月作三人則成兩部不知為何物亦是歇後故用事寧與出處語小異而意同不可盡牽出處語而意不顯也學者多議子瞻朩杪見龜趺以為語病謂龜趺不當出朩杪殊未之思此題程筠光墓歸真亭也東南多葬山上碑亭柱往往在半山間未必皆平地則下視之龜趺出朩杪何足怪哉李豸陽翟人少以文字見蘇子瞻子瞻喜之元祐初知舉豸適就試意在必得豸以魁多士及考章援程文大喜以為豸無疑遂以為魁既拆號悵然出院以詩送豸歸曰平時謾識古戰場過眼終迷日五色蓋道其本意豸自是學亦不進家貧不甚自愛嘗以書責子瞻不薦已子瞻後稍薄之竟不第而死劉季孫平之子能作七字家藏書數干卷善用事送孔宗翰知揚州詩有云詩書魯國真男子歌吹揚州作貴人多稱其精當為杭州鈐轄子瞻作守深知之後嘗以詩寄子瞻云四海共知霜鬢滿重陽曾插菊花無子瞻大喜在頴州和季孫詩所謂一篇向人寫肝肺四海知我霜鬢斑蓋記此也文同字與可蜀人與蘇子瞻為中表兄弟相厚為人靖深超然不攖世故善畫墨竹作詩騷亦過人熙寧初時論既不一士大夫好惡紛然同在館閣未嘗有所向背時子瞻數上書論天下事退而與賔客亦言多以時事為譏誚同極以為不然每苦口力戒之子瞻不能聽也出為杭州通判同送行詩有北客若來休問事西湖雖好莫吟詩之句及黃州之謫正坐杭州詩語人以為知言楊文公在翰林以讒佯狂去職然聖眷之不衰聞疾愈即起為郡未幾復以判祕監召既到闕以詩賜之曰瑣闥往年司制誥共嘉藻思類相如蓬山今日詮墳史還仰多聞過仲舒報政列城歸覲後疏恩髙閣拜恩初諸生濟濟彌瞻望鉛槧咨詢辨魯魚祖宗愛惜人材保全忠賢之意如此文公後卒與寇萊公力排宫闈協定大策功雖不終其盡力於國者亦可以無愧也古詩有離合體近人多不解此體余讀文類得北海四言一篇云漁父屈節水潛匿方與時進止出寺弛張吕公飢釣闔口渭旁九域有聖無土不王好是正直女固子臧海外有截隼逝鷹揚六翮不奮羽儀未彰龍蛇之蟄比他可忘玫琁隱耀美玉韜光無名無譽放言深藏按轡安行誰謂路長此篇離合魯國孔融文舉六字徐而考之詩二十四句每四句離合一字如首章云漁父屈節水潛匿方與時進止出寺弛張第一句漁字第二句水字漁犯水字而去水則存者為魚字第三句有時字第四句有寺字時犯寺字而去寺則存者為日字離魚與日而合之則為魯字下四章類此殆古人好竒之過欲以文字示其巧也劉丞相莘老殿試時蘇丞相子容為詳定官子容後尹南京莘老復僉判在幕中相與歡甚元祐初莘老自中司入為左丞子容猶為翰林學士承旨及莘老遷黃門子容始為左丞莘老宿東省嘗以詩寄子容云膺門早嵗預登龍僉幕中間託下風敢謂彈冠煩貢禹每思移疾避胡公蓋記前事而子容答之有末路自驚黃髮老平時曾識黑頭公之句當時以為盛事又三年莘老既相而罷子容始踐其位云王荆公少以意氣自許故詩語惟其所向不復更為涵蓄如天下蒼生待霖雨不知龍向此中蟠又萬緑叢中紅一點動人春色不須多平治險穢非無力潤澤焦枯是有材之類皆直道其胸中事後為羣牧判官從宋次道盡假唐人詩集博觀而約取晚年始盡深婉不迫之趣乃知文字雖工拙之定限然亦必視初壯雖工方其未至時亦不能力強而遽至此也髙荷荆南人學杜子美作五言頗得句法黃魯直自戎州歸荷以五十韻見魯直極愛賞之嘗和其言有云張侯海內長句朝子廟中雅歌髙郎少加筆力我知三傑同科張謂文潛朝謂無咎也無咎聞之頗不平荷晚為童貫客得蘭州通判以死既不為時論所與其詩亦不復傳云杜牧詩清時有味是無能間愛孤雲靜愛僧擬把一麾江海去樂遊原上望昭陵此蓋不滿於當時故末有望昭陵之句汪輔之在場屋能作賦略與鄭毅夫滕逹道齊名以意氣自負既登第久不得志常鬱鬱不樂語多議刺元豐初始為河北轉運使未幾坐纍謫官纍年遇赦幸復知處州謝表有云清時有味白首無能蔡持正為侍御史引杜牧詩為證以為怨望遂復罷古今人用事有趂筆快意而誤者雖名輩有所不免蘇子瞻石建方欣洗牏厠薑龎不解歎蛜蝛據漢書牏厠本作厠牏蓋中衣也二字義不應可顛倒用魯直啜羮不如放麋樂羊終愧巴西本是西巴見韓非子蓋貪於得韻亦不暇省爾寇萊公南遷道過襄州嘗留一絶句於驛亭曰沙堤築處迎丞相驛吏催時送逐臣到了輸他林下客無榮無辱自由身林下客大槩言之初無所主名也胡祕監旦素不為公所喜時適居郡下既聞之遂以林下客謂公為已發且有稱快之語聞者無不皆笑詩人以一字為工世固知之惟老杜變化開闔出竒無窮殆不可以形迹捕如江山有巴蜀棟宇自齊梁逺近數千里上下數百年只在有與自兩字間而吞納山川之氣俯仰古今之懷皆見於言外滕王亭子粉墻猶竹色虛閣自松聲若不用猶與自兩字則餘八言凡亭子皆可用不必滕王也此皆工妙至到人力不可及而此老獨雍容間肆出於自然略不見其用力處今人多取其已用字模放用之偃蹇狹陋盡成死法不知意與境會言其中節凡字皆可用也讀古人詩多意所喜處誦憶之久往往不覺誤用為己語緑隂生晝寂孤花表春餘此韋蘇州集中最為警䇿而荆公詩乃有緑隂生晝寂幽草弄秋妍之句大抵荆公閲唐詩多於去取之間用意尤精觀百家詩選可見也如蘇子瞻山圍故國城空在潮打西陵意未平此非誤用直是取舊句縱橫役使莫彼我為辨耳慶厯八年王則叛真定既誅始析河北大名定武真定髙陽為四路置帥更命儒臣以輯邊備魏公自鄆州徙鎮各大興方略事無不自親嘗有題養貞亭詩云所期清䇿慮不是愛精神又云吏民還解否吾豈茍安人其志可見矣郡圃號衆春會嵗飢涉春未嘗一逰陳薦在幕府以詩請公云水底魚龍思鼓吹沙頭鷗鷺望旌旗公亟答之云細民溝壑方援手别館鶯花任送春在鎮五年政聲流聞自是天下遂屬以為相王荆公在鍾山有馬甚惡蹄齧不可近一日兩挍牽至庭下告公請鬻之蔡天啓時在坐曰世安有不可調之馬第久不騎驕耳即起捉其騣一躍而上不用銜勒馳數十里而還荆公大壯之即作集句詩贈天啓所謂蔡子勇成癖能騎生馬駒者後又有身著青衫騎惡馬日行三百尚嫌遲心源落落堪為將却是君王耒備知士大夫盛傳荆公以將帥之材許天啓紹聖初章申公當國首欲進天啓侍從會執政有不悅者乃出為永興軍路提舉常平因欲稍遷為帥會丁內艱不果猶是用荆公遺意也元豐間嘗久旱不雨裕陵禁中齋禱甚力一日夢有僧乘馬馳空中口吐雲霧既覺而雨大作翌日遣中貴人尋夢中所見物色於相國寺三門五百羅漢中第十三尊像倣佛即迎入內視之正所夢也王丞相禹玉作喜雨詩云良弼為辜霖雨望神僧作霧應精求元參政厚之仙驥薾雲穿仗下佛花吹雨匝天流蓋記此相國寺羅漢本江南李氏時物在廬山東林寺曹翰下江南盡取其城中金帛寶貨連百餘舟私盜以歸無以為之名乃取羅漢每舟載十許尊獻之詔因賜於相國寺當時謂之神羅漢云荆公詩用法甚嚴尤精於對偶嘗云用漢人語止可以漢人語對若參以異代語便不相類如一水護田將緑繞兩山排闥送青來之類皆漢人語也此惟公用之不覺拘窘卑凡如周顒宅在阿蘭若婁約身隨窣堵波皆以梵語對梵語亦此意嘗有人向公稱自喜田園安五柳但嫌尸祝擾庚桑之句以為的對公笑曰伊但知栁對桑為的然庚亦自是數蓋以十干數之也焦中書南廳壁間有晏元獻題詠上竿伎一詩云百尺竿頭裊裊身足騰跟挂駭傍人漢隂有叟君知否抱甕區區亦未貧當時固必有謂文潞公在樞府嘗一日過中書與荆公行至題下特遲留誦詩久之亦未能無意也荆公他日復題一篇於詩後云賜也能言未識真誤將心許漢隂人桔橰俯仰何妨事抱甕區區老自身張景修字敏叔常州人余大父客也少刻苦作詩至老不衰典雅平易時多佳句元豐末為饒州浮梁令邑子朱天錫以神童應詔景修作詩送之天錫到闕會忘取本州公據為禮部所却因擊登聞鼓院繳景修所送詩為證神宗一見大稱賞之翌日以語宰相王禹玉恨四方有遺材即令召對禹玉言不欲以一詩召人恐長浮競不若俟其秩滿赴部命之遂止令中書籍記姓名比景修罷官任神宗已升遐亦云命矣大觀中始與余同為祠曹郎中年已幾七十有詩數千篇大父元祐間自湖南憲請宫祠歸景修嘗以詩寄曰聞説年來請洞霄江湖奉使久勤勞有神仙處間方得用老成時退更髙借宅但須新種竹尋仙想見舊栽桃浮梁居士塵埃甚鬚髮而今也二毛其詩大抵類此流落無聞亦可惜也常待制秩居汝隂與王深父皆有盛名於嘉祐治平之間屢召不至雖歐陽文忠公亦重推禮之其詩所謂笑殺頴川常處士十年騎馬聽朝雞者是也熙寧初荆公當國力致之遂起判國子監太常禮院聲譽稍減於前嘗一日大雪趨朝與百官待門於仗舍時秩已衰寒甚不可忍喟然若有所恨者乃舉文忠詩以自戲曰凍殺頴川常處士也來騎馬聽朝雞前輩詩文各有平生自得意處不過數篇然他人未必能盡知也毗陵正素處士張子厚善書余嘗於其家見歐陽文忠子棐以烏絲欄絹一軸求子厚書文忠明妃曲兩篇廬山髙一篇略云先公平日未嘗矜大所為文一日被酒語棐曰吾廬山髙今人莫能為唯李太白能之明妃曲後篇太白不能為唯杜子美能之至於前篇則子美亦不能為唯吾能之也因欲别録此三篇也余居吳下一日出閶門至小寺中壁間有題詩一絶云黃葉西陂水漫流遽蒢風急滯扁舟夕陽暝色來千里人語雞聲共一丘意極喜初不書名氏問寺僧云吳縣寇主簿所作今官滿去矣歸而問之吳下士大夫云寇名國寶蓋與余同年然皆莫知其能詩余與國寶榜下未嘗往來亦謾不省其為人已而數為好事者舉此詩始有言國寶徐州人久從陳無已學乃知文字淵源有所自來亦不難辨恨不得多見之也宋景文公子京不甚為韓魏公所知故公當國子京多補外嘉祐末始再入為翰林學士偶朝會子京因病謁告以表自陳云不獲預率舞之列魏公見之殊不樂元祐初駕幸太學吕丞相微仲有詩中間押行字韻館閣諸人皆和秦學士觀一聯云涵天璧水遙迎仗映月深花不亂行諸生聞之亦閧然觀為人喜傲謔然此句實迫於趂韻未必有意也髙麗自太宗後久不入貢至元豐初始遣使來朝神宗以張誠一館伴令問其復朝之意云其國與契丹為鄰每因契丹誅求藉不能堪國主王徽常誦華嚴經祈至中國一夕忽夢至京師備見城邑宫闕之盛覺而慕之乃為詩以記曰惡業因緣近契丹一年朝貢幾多般移身忽到京華地可惜中霄漏滴殘余大觀間館伴髙麗人常見誠一語録備載此事故事使人到闕不過月計日即遣發余館伴時上欲留觀殿試故榜及上已遂幾七十日使者頗修謹詳雅余撫之既厚每相感餞行至占雲館而别其副韓繳如馬上忽使人持一大玉帶贈余云此實故物其家世傳以為寶今以為獻且於笏上自書一詩相别云泣涕泛瀾欲别離此生無復再來期謾將寶玉陳深意莫忘思人見物時余以髙麗使故事無解換例力辭之其詞雖撲拙然亦可見其意也唐詩僧自中葉以後其名字班班為當時所稱者甚多然詩皆不傳如經來白馬寺僧到赤烏年數聯僅見文士所録而已陵遲至貫休齊已之徒其詩雖存然無足言矣中間雖皎然最為傑出故其詩十卷獨全亦無甚過人者近世僧學詩者極多皆無超然自得之氣往往反拾掇模效士大夫所殘棄又自作一種僧體格律尤凡俗世謂之酸餡氣子瞻有贈惠通詩云語帶煙霞從古少氣含蔬筍到公無嘗語人曰頗解蔬筍語否為無酸餡氣也聞者無不皆笑池塘生春草園栁變鳴禽世多不解此語為工蓋欲以竒求之耳此語之工正在無所用意猝然與景相遇借以成章不假繩削故非常情所能到詩家妙處當須以此為根本而思苦難言者往往不悟鍾嶸詩品論之最詳其略云思君如流水既是即目髙臺多悲風亦惟所見清晨登隴首差無故實明月照積雪非出經史古今勝語多非補假皆由直尋顔延之謝莊尤為繁密於時化之故大明泰始中文書殆同書抄近任昉王元長等辭不貴竒競須新事邇來作者寢以成俗遂乃句無虛語語無虛字牽攣補衲蠧文已甚自然英旨罕遇其人余每愛此言簡切明白易曉但觀者未嘗留意耳自唐以後既變以律體固不能無拘窘然茍大手筆亦自不妨削鐻於神志之間斫輪於甘苦之外也姑蘇城外寒山寺夜半鍾聲到客船此唐張繼題城西楓橋寺詩也歐陽文忠公嘗病其夜半非打鍾時蓋公未嘗至吳中今吳中山寺實以夜半打鍾繼詩三十餘篇余家有之往往多佳句王荆公編百家詩選從宋次道借本中間有暝色赴春愁次道改赴字作起字荆公復定為赴字以語次道曰若是起字人誰不能到次道以為然張文定安道未第時貧甚衣食殆不給然意氣豪舉未嘗少貶與劉潛李寇石曼卿往來山東諸郡任氣使酒見者皆傾下之沛縣有漢髙祖廟并歌風臺前後題詩人甚多無不推頌功德獨安道髙祖廟詩曰縱酒疏狂不治生中陽有土不歸耕偶因亂世成功業更向翁前與仲爭又歌風臺曰落魄劉郎作帝歸樽前感慨大風詩淮隂反接英彭族更欲多求猛士為蓋自少已不凡矣京師職事官舊皆無公廨雖宰相執政亦僦舍而居每遇出省或有中批外奏急速文字則省吏偏持於私第呈押既稽緩又多漏泄元豐初始建東西府於右掖門之前每府相對為四位俗謂之八位裕陵幸尚書省駐輦環視久之時張侍郎文裕以詩慶宰執元參政厚之和云黃閣勢連東鳯闕紫樞光直右銀臺蓋東府與西闕相近西府正直右掖門崇寧末蔡魯公罷相始賜第於梁門外大觀初再入因不復遷府居自是相繼何丞相伯通鄭丞相逹夫與今王丞相將明皆賜第援魯公例皆於私第治事而二府往往多虛位或為書局官指射以置局與元豐本意稍異也俞紫芝字秀老揚州人少有髙行不娶得浮屠心法所至翛然而工於作詩王荆公居鍾山秀老數相往來尤愛重之每見於詩所謂公詩何以解人愁初日芙蓉映碧流未怕元劉爭獨步不妨陶謝與同逰是也秀老嘗有夜深童子喚不起猛虎一聲山月髙之句尤為荆公所賞亟和云新詩比舊仍增峭若許追攀莫太髙秀老卒於元祐初惜時無發明之者不得與林和靖一流槩見於隱逸其弟淡字清老亦不娶滑稽善諧謔洞曉音律能歌荆公亦善之晚年作漁家傲等樂府數闋每山行即使淡歌之然淡使酒好罵不若秀老之恬靜一日見公云吾欲去為浮屠但貧無錢買祠部爾公欣然為置祠部淡約日祝髮既過期寂無耗公問其然淡徐曰吾思僧亦不易為公所贈祠部已送酒家償舊債矣公為之大笑黃魯直嘗作三詩贈淡其一云有客夢超俗去髮脫塵冠平明視清鏡正爾良獨難蓋荆公事也姑蘇南園錢氏廣陵王之舊圃也老朩皆合抱流水竒石參錯其間最為工王翰林元之為長洲縣宰時無日不携客醉飲常有詩曰他年我若功成後乞取南園作醉鄉今園中大堂遂以醉鄉名之大觀末蔡魯公罷相欲東還詔以園賜公公即戲以詩示親黨云八年帷幄竟何為更賜南園寵退師堪笑當時王學士功名未有便吟詩至和嘉祐間場屋舉子為文尚竒澀讀或不能成句歐陽文忠公力欲革其弊既知貢舉凡文涉雕刻者皆黜之時范景仁王禹玉梅公儀等同事而梅聖俞為參詳官未引試前唱酬詩極多文忠無譁戰士銜枚勇下筆春蠶食葉聲最為警䇿聖俞有萬蟻戰時春日暖五星明處夜堂深亦為諸公所稱及放榜平時有聲如劉輝輩皆不預選士論頗洶洶未幾時傳遂閧閧然以為主司耽於唱酬不暇詳考挍且以言五星自比而待我曹為蠶蟻因造為配語自是禮闈不復敢作詩終元豐末幾三十年元祐初雖稍稍為之要不如前日之盛然是榜得蘇子瞻為第二人子由與曾子固皆在選中亦不可謂不得人矣蘇明允至和間來京師既為歐陽文忠公所知其名翕然韓忠憲諸公皆侍以上客嘗遇忠憲忠憲置酒私第惟文忠與一二執政而明允乃以布衣參其間都人以為之異禮席間賦詩明允有佳節屢從愁裏過壯心時傍醉中來之句其意氣尤不少衰明允詩不多見然精深有味語不徒發正類其文如讀易詩云誰為善相應嫌瘦後有知音可廢彈婉而不迫哀而不傷所作自不必多也張先郎中字子野能為詩及樂府至老不衰居錢塘蘇子瞻作倅時先年已八十餘視聽尚精強家猶畜聲妓子瞻嘗贈以詩云詩人老去鶯鶯在公子歸來燕燕忙蓋全用張氏故事戲之先和云愁似鰥魚知夜永懶同蝴蝶為春忙極為子瞻所賞然俚俗多喜傳詠先樂府遂掩其詩聲識者皆以為恨云元厚之知荆南嘗夢至仙府與三人者聯書名傍有告之曰君三人蓋兄弟也覺而思之莫知所謂未幾召入為學士時韓持國維揚元素繪先已在院一日因書奏列名三人名皆從絞絲始悟夢中兄弟之意豈造物以是為戲耶已而持國元素皆外補厚之尹京後三年復與元素還職而鄧文約相繼為直院則三人之名又皆從絞絲蓋終始皆同決非偶然以此推之仕宦升沉進退豈可以人力計許大夫選嘗作四翰林詩記其事厚之和云聯名適似三株樹傳玩驚看五朵雲此亦一時之異也晉魏間詩尚未知聲律對偶然陸雲相謔之辭所謂日下荀鳴鶴雲間陸士龍者乃指為的對至四海習鑿齒彌天釋道安之類不一乃知此體出於自然不待沈約而後能也舊不解四海彌天為何等語因讀梁慧皎髙僧傳載鑿齒與道安書云天不終朝而雨六合者彌天之雲也𢎞淵源而潤八極者四海之流也故摘其語以為戲耳始晉初為佛學者皆從其師姓如支遁本姓關從支謙學故為支道安以佛學皆本釋迦為師請以釋命氏遂為定制則釋道安者亦其姓也詩語固忌用巧太過然緣情體物自有天然工妙雖巧而不見刻削之痕老杜細雨魚兒出微風燕子斜此十字殆無一字虛設雨細著水靣為漚魚常一浮而淰若大雨則伏而不出矣燕體輕弱風猛則不能勝惟微風乃受以為勢故又有輕燕受風斜之語至穿花蛺蝶深深見點水蜻蜓欵欵飛深深字若無穿字欵欵字若無點字皆無以見其精微如此然讀之渾然全似未嘗用力此所以不礙其氣格超勝使晚唐諸子為之便當如魚躍練波拋玉尺鶯穿絲栁織金梭體矣七言難於氣象雄渾句中有力而紆徐不失言外之意自老杜錦江春色來天地玉壘浮雲變古今與五更鼓角聲悲壯三峽星河影動搖等句之後常恨無復繼者韓退之筆力最為傑出然每苦意與語俱盡和裴晉公破蔡州回詩所謂將軍舊壓三司貴相國新兼五等崇非不壯也然意亦盡於此矣不若劉禹錫賀晉公留守東都云天子旌旗分一半八方風雨會中州語逺而體大也人之材力信自有限李翺皇甫湜皆韓退之髙弟而二人獨不傳其詩不應散亡無一篇存者計是非其所長故不多作耳退之集中有題湜公安園池詩後云爾雅注蟲魚定非磊落人又有用將濟諸人捨得業孔顔意若譏其徒為無益而勸之使不作者翺見於逺逰聯句惟前之詎灼灼此去信悠悠一出之後遂不復見亦可知矣然二人以非所工而不作愈於不能而強為之亦可謂善用其短矣元豐既行官制準唐故事定宰相上事儀以御史中丞押百官班拜於階下宰相答拜於阼階上時王禹玉除左僕射蔡持正右僕射神宗命即尚書省行之二人力辭帝不可曰既以董正治官不得不正其方分於始此國體非為卿設也二人乃受命時元厚之已致仕居吳以詩賀王禹玉有前殿聽宣中禁制南宫看集外朝班星辰影落三階下桃李隂成四海間之句時最為盛事自是相繼入相者皆不復再講此禮信不可常行也劉季孫初以左班殿直監饒州酒王荆公為江東提刑巡厯至饒按酒務始至廳事見屏間有題小詩曰呢喃燕子語梁間底事來驚夢裏間説與傍人應不解杖藜携酒看芝山大稱賞之問專知官誰所作以季孫言即召與之語嘉歎升車而去不復問務事既至傳舍適郡學生持狀立庭下請差官攝州學事公判監酒殿直一郡大驚遂知名云舊説徐敬業敗與駱賔王俱不死皆去為浮屠以免賔王居杭州靈隱寺因續宋之問詩人始知之而唐新書不載今宋詩乃見賔王集中惟題鷲嶺鬱苕嶢龍宫鎖寂寥兩句是宋作自樓觀滄海日門對浙江潮以後五韻皆賔王所續方武后初革命天下所共疾敬業與賔王首唱義則世哀之而為隱藏理或有之此詩不知後人因其傳而録之賔王集耶或本集固自為賔王作而收之也然賔王集乃古本非後人所裒次者若此詩當時已自録於集中則賔王之不死亦一證也魏晉間人詩大抵專工一體如侍宴從軍之類故後來相與祖習者亦但因其所長取之耳謝靈運擬鄴中七子與江淹雜擬是也梁鍾嶸作詩品皆云某人詩出於某人亦以此然論陶淵明乃以為出於應璩此語不知其所據應璩詩不多見惟文選載其百一詩一篇所謂下流不可處君子慎厥初者與陶詩了不相類五臣注引文章録云曹爽用事多違法度璩作此詩以刺在位意若百分有補於一者淵明正以脫略世故超然物外為意顧區區在位者何足纍其心哉且此老何嘗有意欲以詩自名而追取一人而模放之此乃當時文士與世進取競進而爭長者所為何期此老之淺蓋嶸之陋也江淹擬湯惠休詩曰日暮碧雲合佳人殊未來古今以為佳句然謝靈運圓景早已滿佳人猶未還謝玄睴春草秋更緑公子未西歸即是此意嘗怪兩漢間所作騷文未嘗有新語直是句句規模屈宋但換字不同耳至晉宋以後詩人之辭其敝亦然若是雖工亦何足道蓋當時祖習共以為然故未有譏之者耳嵇康幽憤詩云性不傷物頻致怨憎昔慙下惠今愧孫登蓋志鍾會之悔也吾嘗讀世説知康乃魏宗室壻審如此雖不忤鍾會亦安能免死耶嘗稱阮籍口不臧否人物以為可師殊不然籍雖不臧否人而作青白眼亦何以異籍得全於晉直是早附司馬師隂託其庇耳史言禮法之士嫉之如讐賴司馬景王全之以此而言籍非附司馬氏未必能脫禍也今文選載蔣濟勸進表一篇乃籍所作籍忍至此亦何所不可為籍著論鄙世俗之士以為猶虱處乎裩中籍委身於司馬氏獨非裩中乎觀康尚不屈於鍾會肯賣魏而附晉乎世俗但以迹之近似者取之蓋以為嵇阮吾每為之太息也晉人多言飲酒有至於沉醉者此未必意真在於酒蓋方時艱難人各懼禍惟託於醉可以粗逺世故蓋自陳平曹參以來已用此䇿漢書記陳平於劉吕未判之際日飲醇酒戲婦人是豈真好飲耶曹參雖與此異然方欲解秦之煩苛付之清淨以酒杜人是亦一術不然如蒯通輩無事而獻説者且將日走其門矣流傳至嵇阮劉伶之徒雖全欲用此為保身之計此意惟顔延年知之故五君詠云劉伶善閉關懷情滅聞見韜精日沉飲誰知非荒宴如是飲者未必劇飲醉者未必真醉也後世不知此凡溺於酒者往往以嵇阮為例濡首腐脅亦何恨於死耶古今論詩者多矣吾獨愛湯惠休稱謝靈運為初日芙渠沈約稱王筠為彈丸脫手兩語最當人意初日芙渠非人力所能為而精彩華妙之意自然見於造化之妙靈運諸詩可以當此者亦無幾彈丸脫手雖是輸寫便利動無留礙然其精圓快速發之在手筠亦未能盡也然作詩審到此地豈復更有餘事韓退之贈張籍云君詩多態度靄靄春空雲司空圖記戴叔倫語云詩人之辭如藍田日暖良玉生煙亦是形似之微妙者但學者不能味其言耳王介字中甫衢州人博學善譏謔嘗舉制科不中與王荆公逰甚欵曲然未嘗降意少相下熙寧初荆公以翰林學士被召前此屢召不起至是始受命介以詩寄云草廬三顧動幽蟄蕙帳一空生曉寒用蕙帳事蓋有所諷荆公得之大笑他日作詩有丈夫出處非無意猿鶴從來自不知之句蓋為介發也詩禁體物語此學詩者類能言之也歐陽文忠公守汝隂嘗與客賦雪於聚星堂舉此令往往皆閣筆不能下然此亦定法若能者則出入縱橫何可拘礙鄭谷亂飄僧舍茶煙溼密酒歌樓酒力微非不去體物語而氣格如此其卑蘇子瞻凍合玉樓寒起粟光搖銀海眩生花超然飛動何害其言玉樓銀海韓退之兩篇力欲去此弊雖冥搜竒譎亦不免有縞帶銀杯之句杜子美暗度南樓月寒生北渚雲初不避雲月字若隨風且開葉帶雨不成花則退之兩篇殆無以過之也韓魏公初鎮定武時年才四十五德望偉然中外莫不傾屬公亦自以天下為已任遇事不憚勤勞晚作閲古堂嘗為八詠其壘石藥圃溝泉三篇卒章云主人未有銘功處日視崔嵬激壯懷吾心盡欲醫民病長得憂民病不銷誰知到此幽間地多少餘波濟物來其意氣所懷固已見於造次賦詠之間終成大勳豈徒言之而已哉五代王仁裕知貢舉王丞相漙為狀元時年二十六後六年遂相周世宗猶及本朝以太子太保罷歸班年才四十二前此所未有也溥初拜相仁裕猶致仕無恙嘗以詩賀溥云一戰文場拔趙旗便調金鼎佐無為白麻驟降恩何極黃髮初聞喜可知跋勑按前人到少築沙堤上馬歸遲立班始得遙相見親洽爭如未貴時溥在位每休沐必詣仁裕從容終日蓋唐以來座主門生之禮尤厚今王丞相將明霍侍郎端友榜南省奏名時知舉四人安樞密處厚劉尚書彥修與今鄧樞密子常范右丞謙叔吾亦忝點檢試卷官鄧范不唯及見其登庸可以繼仁裕且同在政府則仁裕所不及也石林詩話
